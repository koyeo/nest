<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nest Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;600&display=swap');

        /* ── Dark theme ── */
        :root,
        [data-theme="dark"] {
            --bg: #0f1117;
            --panel-bg: #161922;
            --border: #2a2e3a;
            --text: #c9cdd6;
            --text-dim: #5a5f6e;
            --accent: #6c8cff;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --cyan: #22d3ee;
            --hover-bg: rgba(108, 140, 255, 0.06);
            --active-bg: rgba(108, 140, 255, 0.12);
            --badge-run-bg: rgba(251, 191, 36, 0.15);
            --badge-done-bg: rgba(74, 222, 128, 0.15);
            --badge-fail-bg: rgba(248, 113, 113, 0.15);
            --scrollbar-thumb: #2a2e3a;
        }

        /* ── Light theme ── */
        [data-theme="light"] {
            --bg: #f5f6f8;
            --panel-bg: #ffffff;
            --border: #e2e5ea;
            --text: #2c3040;
            --text-dim: #8c91a0;
            --accent: #4a6cf7;
            --green: #16a34a;
            --red: #dc2626;
            --yellow: #ca8a04;
            --cyan: #0891b2;
            --hover-bg: rgba(74, 108, 247, 0.05);
            --active-bg: rgba(74, 108, 247, 0.1);
            --badge-run-bg: rgba(202, 138, 4, 0.1);
            --badge-done-bg: rgba(22, 163, 74, 0.1);
            --badge-fail-bg: rgba(220, 38, 38, 0.1);
            --scrollbar-thumb: #d0d3da;
        }

        /* ── System theme ── */
        @media (prefers-color-scheme: light) {
            [data-theme="system"] {
                --bg: #f5f6f8;
                --panel-bg: #ffffff;
                --border: #e2e5ea;
                --text: #2c3040;
                --text-dim: #8c91a0;
                --accent: #4a6cf7;
                --green: #16a34a;
                --red: #dc2626;
                --yellow: #ca8a04;
                --cyan: #0891b2;
                --hover-bg: rgba(74, 108, 247, 0.05);
                --active-bg: rgba(74, 108, 247, 0.1);
                --badge-run-bg: rgba(202, 138, 4, 0.1);
                --badge-done-bg: rgba(22, 163, 74, 0.1);
                --badge-fail-bg: rgba(220, 38, 38, 0.1);
                --scrollbar-thumb: #d0d3da;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ── Header ── */
        .header {
            padding: 9px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        .header .project {
            font-size: 12px;
            color: var(--text-dim);
        }

        .header .spacer {
            flex: 1;
        }

        .header .status {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* ── Control buttons ── */
        .controls {
            display: flex;
            gap: 4px;
        }

        .ctrl-btn {
            font-size: 11px;
            padding: 3px 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.12s;
            font-family: inherit;
        }

        .ctrl-btn:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: var(--accent);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .ctrl-btn.stop {
            color: var(--red);
            border-color: var(--red);
        }

        .ctrl-btn.stop:hover:not(:disabled) {
            background: rgba(248, 113, 113, 0.1);
        }

        /* ── Theme toggle ── */
        .theme-toggle {
            display: flex;
            gap: 2px;
            background: var(--bg);
            border-radius: 5px;
            padding: 2px;
            border: 1px solid var(--border);
        }

        .theme-btn {
            font-size: 12px;
            padding: 2px 6px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 3px;
            cursor: pointer;
            line-height: 1;
        }

        .theme-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* ── Main container ── */
        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Steps panel ── */
        .steps-panel {
            width: 280px;
            min-width: 180px;
            background: var(--panel-bg);
            overflow-y: auto;
            padding: 8px 0;
            flex-shrink: 0;
        }

        /* ── Tree ── */
        .tree-node {
            display: flex;
            align-items: flex-start;
            padding: 5px 12px 5px 0;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s;
        }

        .tree-node:hover {
            background: var(--hover-bg);
        }

        .tree-node.active {
            background: var(--active-bg);
        }

        .tree-indent {
            flex-shrink: 0;
        }

        .tree-toggle {
            flex-shrink: 0;
            width: 16px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: var(--text-dim);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .tree-toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-toggle.hidden {
            visibility: hidden;
        }

        .tree-icon {
            flex-shrink: 0;
            width: 16px;
            text-align: center;
            font-size: 11px;
            margin-right: 6px;
        }

        .tree-name {
            line-height: 1.5;
            word-break: break-all;
            user-select: text;
            flex: 1;
        }

        .tree-node.pending .tree-icon {
            color: var(--text-dim);
        }

        .tree-node.running .tree-icon {
            color: var(--yellow);
        }

        .tree-node.done .tree-icon {
            color: var(--green);
        }

        .tree-node.failed .tree-icon {
            color: var(--red);
        }

        .tree-node.running .tree-name {
            color: var(--yellow);
            font-weight: 600;
        }

        .tree-node.done .tree-name {
            color: var(--text-dim);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .tree-node.running .tree-icon {
            animation: pulse 1s ease-in-out infinite;
        }

        .tree-children {
            overflow: hidden;
            transition: max-height 0.2s ease;
        }

        .tree-children.collapsed {
            max-height: 0 !important;
        }

        /* ── Split handle ── */
        .split-handle {
            width: 4px;
            cursor: col-resize;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .split-handle:hover,
        .split-handle.dragging {
            background: var(--accent);
        }

        /* ── Output panel ── */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 200px;
        }

        .output-header {
            padding: 7px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--cyan);
            font-weight: 600;
            background: var(--panel-bg);
            flex-shrink: 0;
        }

        .output-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
            user-select: text;
            background: var(--bg);
        }

        .output-inner {
            padding: 8px 16px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-sep {
            display: block;
            color: var(--accent);
            border-top: 1px solid var(--border);
            margin: 6px 0;
            padding-top: 6px;
            font-weight: 600;
            font-size: 11px;
        }

        .log-error {
            color: var(--red);
            font-weight: 600;
        }

        /* ── Footer ── */
        .footer {
            padding: 5px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            background: var(--panel-bg);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .badge {
            padding: 1px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge.running {
            background: var(--badge-run-bg);
            color: var(--yellow);
        }

        .badge.done {
            background: var(--badge-done-bg);
            color: var(--green);
        }

        .badge.failed {
            background: var(--badge-fail-bg);
            color: var(--red);
        }

        .footer .path {
            opacity: 0.7;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        /* ── Prompt overlay ── */
        .prompt-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .prompt-overlay.active {
            display: flex;
        }

        .prompt-box {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-width: 360px;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .prompt-box .prompt-msg {
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 12px;
            color: var(--text);
        }

        .prompt-box input {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }

        .prompt-box input:focus {
            border-color: var(--accent);
        }

        .prompt-box .prompt-hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ── Config Drawer ── */
        .drawer-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 90;
        }

        .drawer-backdrop.active {
            display: block;
        }

        .config-drawer {
            position: fixed;
            top: 0;
            right: -520px;
            width: 520px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            z-index: 91;
            transition: right 0.25s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.2);
        }

        .config-drawer.open {
            right: 0;
        }

        .drawer-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .drawer-header .drawer-path {
            font-weight: 400;
            opacity: 0.6;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .drawer-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            line-height: 1;
        }

        .drawer-close:hover {
            color: var(--text);
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .cfg-line {
            display: flex;
            white-space: pre;
            line-height: 1.7;
            padding: 0 12px;
        }

        .cfg-line.hl {
            background: rgba(255, 200, 50, 0.12);
        }

        .cfg-linenum {
            color: var(--text-dim);
            text-align: right;
            min-width: 32px;
            padding-right: 12px;
            user-select: none;
            opacity: 0.5;
        }

        .cfg-code {
            flex: 1;
            color: var(--text);
        }

        .cfg-code .yk {
            color: #e06c75;
        }

        /* yaml key */
        .cfg-code .yv {
            color: #98c379;
        }

        /* yaml value */
        .cfg-code .yc {
            color: #5c6370;
            font-style: italic;
        }

        /* yaml comment */
        .cfg-code .ys {
            color: #e5c07b;
        }

        /* yaml string */
        .tree-cfg-btn {
            opacity: 0;
            cursor: pointer;
            font-size: 12px;
            margin-left: auto;
            padding: 0 4px;
            transition: opacity 0.15s;
        }

        .tree-node:hover .tree-cfg-btn {
            opacity: 0.6;
        }

        .tree-cfg-btn:hover {
            opacity: 1 !important;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🚀 <span id="projectName">Project</span></h1>
        <span class="project">/ <span id="taskName">Task</span></span>
        <span class="spacer"></span>
        <div class="controls">
            <button class="ctrl-btn stop" id="btnStop" disabled title="Stop">■ Stop</button>
            <button class="ctrl-btn" id="btnRerun" disabled title="Rerun">↻ Rerun</button>
        </div>
        <div class="theme-toggle">
            <select id="themeSelect"
                style="background:var(--panel-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;outline:none;">
                <option value="system">🖥 System</option>
                <option value="light">☀ Light</option>
                <option value="dark">🌙 Dark</option>
            </select>
        </div>
    </div>
    <div class="container">
        <div class="steps-panel" id="stepsPanel"></div>
        <div class="split-handle" id="splitHandle"></div>
        <div class="output-panel">
            <div class="output-header" id="outputHeader">📺 Output</div>
            <div class="output-content" id="outputContent">
                <div class="output-inner" id="outputInner"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <span class="badge running" id="statusBadge">Running</span>
        <span id="footerInfo"></span>
        <span style="flex:1"></span>
        <span class="path" id="projectPath"></span>
    </div>
    <div class="prompt-overlay" id="promptOverlay">
        <div class="prompt-box">
            <div class="prompt-msg" id="promptMsg"></div>
            <input type="text" id="promptInput" autocomplete="off" />
            <div class="prompt-hint">Press Enter to confirm</div>
        </div>
    </div>
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="config-drawer" id="configDrawer">
        <div class="drawer-header">
            <span>📄 Config</span>
            <span class="drawer-path" id="drawerPath"></span>
            <button class="drawer-close" id="drawerClose">✕</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>

    <script>
        /* ── DOM refs ── */
        const $ = id => document.getElementById(id);
        const stepsPanel = $('stepsPanel'), outputInner = $('outputInner'), outputContent = $('outputContent');
        const outputHeader = $('outputHeader');
        const statusBadge = $('statusBadge'), footerInfo = $('footerInfo');
        const taskNameEl = $('taskName'), projectNameEl = $('projectName'), projectPathEl = $('projectPath');
        const btnStop = $('btnStop'), btnRerun = $('btnRerun');
        const promptOverlay = $('promptOverlay'), promptMsg = $('promptMsg'), promptInput = $('promptInput');
        const drawerBackdrop = $('drawerBackdrop'), configDrawer = $('configDrawer');
        const drawerBody = $('drawerBody'), drawerPath = $('drawerPath'), drawerClose = $('drawerClose');

        /* ── Clipboard: Cmd/Ctrl+C copy support for webview ── */
        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'c') {
                const sel = window.getSelection();
                if (sel && sel.toString()) {
                    navigator.clipboard.writeText(sel.toString());
                }
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'a') {
                // Allow select-all in output panel
            }
        });

        /* ── Theme ── */
        const themeSelect = $('themeSelect');
        const savedTheme = localStorage.getItem('nest-theme') || 'system';

        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('nest-theme', t);
            if (themeSelect) themeSelect.value = t;
        }

        setTheme(savedTheme);
        themeSelect.addEventListener('change', () => setTheme(themeSelect.value));

        /* ── Control buttons ── */
        btnStop.addEventListener('click', () => sendAction('stop'));
        btnRerun.addEventListener('click', () => sendAction('rerun'));

        function sendAction(action) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'action', action }));
            }
        }

        function updateButtons(isRunning) {
            btnStop.disabled = !isRunning;
            btnRerun.disabled = isRunning;
        }

        /* ── Config Drawer ── */
        let configContent = '', configPath = '';

        function highlightYaml(text) {
            // Escape HTML
            const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Comment lines
            if (/^\s*#/.test(text)) return '<span class="yc">' + esc + '</span>';
            // Key: value lines
            const m = esc.match(/^(\s*)([\w\-\.]+)(:)(.*)/);
            if (m) {
                let val = m[4];
                // Highlight quoted strings in value
                val = val.replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;|"[^"]*"|'[^']*')/g, '<span class="ys">$1</span>');
                return m[1] + '<span class="yk">' + m[2] + '</span>' + m[3] + '<span class="yv">' + val + '</span>';
            }
            // List items
            const li = esc.match(/^(\s*-\s+)(.*)/);
            if (li) return li[1] + '<span class="yv">' + li[2] + '</span>';
            return esc;
        }

        function findTaskLines(lines, name) {
            const hl = new Set();
            if (!name) return hl;
            let inBlock = false, blockIndent = -1;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i], trimmed = line.trimStart();
                const indent = line.length - trimmed.length;
                if (!inBlock) {
                    if (trimmed.startsWith(name + ':') ||
                        trimmed.includes(': ' + name) ||
                        trimmed.includes('"' + name + '"') ||
                        trimmed.includes("'" + name + "'")) {
                        inBlock = true; blockIndent = indent; hl.add(i);
                    }
                } else {
                    if (trimmed === '' || indent > blockIndent) { hl.add(i); }
                    else { inBlock = false; }
                }
            }
            return hl;
        }

        function openDrawer(stepName) {
            drawerBody.innerHTML = '';
            if (!configContent) return;
            const lines = configContent.split('\n');
            const hlLines = findTaskLines(lines, stepName);
            let firstHl = -1;
            lines.forEach((line, i) => {
                const el = document.createElement('div');
                el.className = 'cfg-line' + (hlLines.has(i) ? ' hl' : '');
                if (hlLines.has(i) && firstHl < 0) firstHl = i;
                const num = document.createElement('span');
                num.className = 'cfg-linenum'; num.textContent = i + 1;
                const code = document.createElement('span');
                code.className = 'cfg-code'; code.innerHTML = highlightYaml(line);
                el.append(num, code);
                drawerBody.appendChild(el);
            });
            configDrawer.classList.add('open');
            drawerBackdrop.classList.add('active');
            if (firstHl >= 0) {
                const target = drawerBody.children[firstHl];
                if (target) target.scrollIntoView({ block: 'center' });
            }
        }

        function closeDrawer() {
            configDrawer.classList.remove('open');
            drawerBackdrop.classList.remove('active');
        }
        drawerClose.addEventListener('click', closeDrawer);
        drawerBackdrop.addEventListener('click', closeDrawer);

        /* ── Prompt handling ── */
        promptInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const val = promptInput.value;
                promptOverlay.classList.remove('active');
                promptInput.value = '';
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'prompt_response', response: val }));
                }
            }
        });

        /* ── State ── */
        let steps = [], currentStep = -1, autoScroll = true, logLength = 0;
        const MAX_DOM = 500000;
        let stepLogMarkers = {};

        function resetUI() {
            steps.forEach(s => { s.status = 'pending'; });
            currentStep = -1;
            outputInner.innerHTML = '';
            logLength = 0;
            stepLogMarkers = {};
            outputHeader.textContent = '📺 Output';
            footerInfo.textContent = '';
            statusBadge.className = 'badge running';
            statusBadge.textContent = 'Running';
            headerStatus.textContent = 'Running';
            autoScroll = true;
            renderTree();
        }

        outputContent.addEventListener('scroll', () => {
            autoScroll = outputContent.scrollTop + outputContent.clientHeight >= outputContent.scrollHeight - 40;
        });

        /* ── Split ── */
        let dragging = false;
        $('splitHandle').addEventListener('mousedown', e => { dragging = true; $('splitHandle').classList.add('dragging'); document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', e => { if (!dragging) return; stepsPanel.style.width = Math.max(150, Math.min(500, e.clientX)) + 'px'; });
        document.addEventListener('mouseup', () => { if (dragging) { dragging = false; $('splitHandle').classList.remove('dragging'); document.body.style.cursor = ''; } });

        /* ── Tree ── */
        function renderTree() {
            stepsPanel.innerHTML = '';
            renderLevel(stepsPanel, 0, steps.length, 0);
        }
        function renderLevel(container, start, end, depth) {
            let i = start;
            while (i < end) {
                const s = steps[i];
                if (s.depth < depth) break;
                if (s.depth > depth) { i++; continue; }
                const node = document.createElement('div');
                node.className = 'tree-node ' + s.status;
                if (i === currentStep) node.classList.add('active');
                const indent = document.createElement('span');
                indent.className = 'tree-indent'; indent.style.width = (depth * 16 + 8) + 'px';
                const toggle = document.createElement('span');
                toggle.className = 'tree-toggle' + (s.is_group ? (s.expanded ? ' expanded' : '') : ' hidden');
                toggle.textContent = '▶';
                const icons = { pending: '○', running: '▶', done: '✓', failed: '✗' };
                const icon = document.createElement('span');
                icon.className = 'tree-icon'; icon.textContent = icons[s.status];
                const name = document.createElement('span');
                name.className = 'tree-name'; name.textContent = s.name;
                const cfgBtn = document.createElement('span');
                cfgBtn.className = 'tree-cfg-btn'; cfgBtn.title = 'View config';
                cfgBtn.innerHTML = '<svg viewBox="0 0 1024 1024" width="14" height="14" fill="currentColor"><path d="M572.16 163.712L389.952 843.712l61.824 16.576L633.984 180.288l-61.824-16.576zM137.6 512l219.2 219.2-45.248 45.248L74.24 539.136a38.4 38.4 0 0 1 0-54.272l237.312-237.312 45.248 45.248L137.6 512zM886.144 512l-220.16 217.728 44.928 45.44 238.656-235.84a38.4 38.4 0 0 0 0-54.656l-238.656-235.904-44.992 45.504L886.144 512z"/></svg>';
                cfgBtn.addEventListener('click', ev => { ev.stopPropagation(); openDrawer(s.name); });
                node.append(indent, toggle, icon, name, cfgBtn);
                const idx = i;
                node.addEventListener('click', e => {
                    if (s.is_group && e.target === toggle) { s.expanded = !s.expanded; renderTree(); }
                    else { scrollToLog(idx); }
                });
                container.appendChild(node);
                if (s.is_group) {
                    const ce = groupEnd(i, depth);
                    const ch = document.createElement('div');
                    ch.className = 'tree-children' + (s.expanded ? '' : ' collapsed');
                    ch.style.maxHeight = s.expanded ? '9999px' : '0';
                    renderLevel(ch, i + 1, ce, depth + 1);
                    container.appendChild(ch); i = ce;
                } else { i++; }
            }
        }
        function groupEnd(gi, d) { for (let i = gi + 1; i < steps.length; i++) { if (steps[i].depth <= d) return i; } return steps.length; }

        /* ── Log ── */
        function appendLog(text) {
            logLength += text.length;
            outputInner.appendChild(document.createTextNode(text));
            if (logLength > MAX_DOM * 1.5) trimDOM();
            if (autoScroll) outputContent.scrollTop = outputContent.scrollHeight;
        }
        function appendSep(idx, name) {
            const sep = document.createElement('span');
            sep.className = 'log-sep'; sep.textContent = '─── ' + name + ' ───';
            sep.id = 'step-marker-' + idx;
            outputInner.appendChild(sep); outputInner.appendChild(document.createTextNode('\n'));
            stepLogMarkers[idx] = sep;
            if (autoScroll) outputContent.scrollTop = outputContent.scrollHeight;
        }
        function appendError(text) {
            const span = document.createElement('span');
            span.className = 'log-error'; span.textContent = text;
            outputInner.appendChild(span);
            if (autoScroll) outputContent.scrollTop = outputContent.scrollHeight;
        }
        function trimDOM() {
            while (logLength > MAX_DOM && outputInner.childNodes.length > 10) {
                const f = outputInner.childNodes[0]; logLength -= (f.textContent || '').length; outputInner.removeChild(f);
            }
        }
        function scrollToLog(idx) {
            const m = stepLogMarkers[idx];
            if (m) { m.scrollIntoView({ behavior: 'smooth', block: 'start' }); autoScroll = false; }
        }

        /* ── WebSocket ── */
        const ws = new WebSocket('ws://' + location.host + '/ws');
        ws.onopen = () => { updateButtons(true); };
        ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            switch (msg.type) {
                case 'init':
                    configContent = msg.config_content || '';
                    configPath = msg.config_path || '';
                    drawerPath.textContent = configPath;
                    taskNameEl.textContent = msg.task_name;
                    projectNameEl.textContent = msg.project_name || 'Project';
                    projectPathEl.textContent = msg.project_path || '';
                    document.title = (msg.project_name || 'Nest') + ' — ' + msg.task_name;
                    if (msg.step_details && msg.step_details.length) {
                        steps = msg.step_details.map(d => ({ ...d, status: 'pending', expanded: true }));
                    } else {
                        steps = msg.steps.map(n => ({ name: n, depth: 0, is_group: false, status: 'pending', expanded: true }));
                    }
                    renderTree();
                    break;
                case 'step_start':
                    if (currentStep >= 0 && currentStep < steps.length && steps[currentStep].status === 'running') steps[currentStep].status = 'done';
                    currentStep = msg.index;
                    if (currentStep >= 0 && currentStep < steps.length) {
                        steps[currentStep].status = 'running';
                        outputHeader.textContent = '📺 ' + steps[currentStep].name;
                        appendSep(currentStep, steps[currentStep].name);
                    }
                    renderTree();
                    break;
                case 'step_done':
                    const idx = msg.index >= 0 ? msg.index : currentStep;
                    if (idx >= 0 && idx < steps.length) {
                        steps[idx].status = msg.error ? 'failed' : 'done';
                    }
                    renderTree();
                    break;
                case 'output':
                    appendLog(msg.content);
                    break;
                case 'task_done':
                    statusBadge.className = 'badge ' + (msg.error ? 'failed' : 'done');
                    statusBadge.textContent = msg.error ? 'Failed' : 'Done';
                    footerInfo.textContent = msg.error || 'All steps completed';
                    if (msg.error) {
                        appendError('\n❌ Task Failed: ' + msg.error + '\n');
                    } else {
                        const s = document.createElement('span');
                        s.style.color = 'var(--green)';
                        s.style.fontWeight = '600';
                        s.textContent = '\n✅ All steps completed successfully\n';
                        outputInner.appendChild(s);
                    }
                    steps.forEach(s => { if (s.status === 'running') s.status = msg.error ? 'failed' : 'done'; });
                    updateButtons(false);
                    renderTree();
                    break;
                case 'state':
                    updateButtons(msg.state === 'running');
                    if (msg.state === 'running') {
                        statusBadge.className = 'badge running';
                        statusBadge.textContent = 'Running';
                    }
                    break;
                case 'reset':
                    if (msg.config_content) configContent = msg.config_content;
                    resetUI();
                    break;
                case 'prompt':
                    promptMsg.textContent = msg.message;
                    promptInput.value = '';
                    promptOverlay.classList.add('active');
                    setTimeout(() => promptInput.focus(), 50);
                    break;
            }
        };
        ws.onclose = () => { updateButtons(false); };
    </script>
</body>

</html>
